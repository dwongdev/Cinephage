name: Discord Release Announcement

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag_name:
        required: true
        type: string

jobs:
  announce:
    name: Announce Release
    runs-on: ubuntu-latest

    steps:
      - name: Skip dev prereleases
        run: |
          TAG="${{ inputs.tag_name || github.ref_name }}"
          if echo "$TAG" | grep -qE '\-dev\.[0-9]+$'; then
            echo "Skipping dev prerelease announcement"
            exit 0
          fi

      - name: Post to Discord
        env:
          TAG: ${{ inputs.tag_name || github.ref_name }}
          REPO: ${{ github.repository }}
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          VERSION="${TAG#v}"
          RELEASE_URL="https://github.com/${REPO}/releases/tag/${TAG}"
          TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          curl -sf -X POST "$WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$(cat <<EOJSON
          {
            "content": "<@&1449935793958293585>",
            "username": "Cinephage Releases",
            "avatar_url": "https://raw.githubusercontent.com/${REPO}/main/static/logo.png",
            "embeds": [{
              "color": 2067276,
              "title": "${TAG}",
              "url": "${RELEASE_URL}",
              "description": "A new Cinephage release is now available.",
              "footer": { "text": "Cinephage" },
              "timestamp": "${TIMESTAMP}"
            }]
          }
          EOJSON
          )"

          echo "Discord announcement sent for ${TAG}"
